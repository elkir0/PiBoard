# PI-Board wake word "Terminator" — livekit-wakeword, Piper (EN) backbone.
# Premier modele : conv-attention "small" (edge/Pi-friendly), sans ACAV (16 GB)
# pour rester faisable sur reseau instable. Negatifs adverses forts + MUSAN.
model_name: terminator
target_phrases: ["terminator"]

# --- Data generation ---
n_samples: 8000
n_samples_val: 1500
n_background_samples: 800
n_background_samples_val: 200
tts_batch_size: 50

# Voisins phonetiques de "terminator" a NE PAS declencher.
custom_negative_phrases:
  - "terminate"
  - "terminated"
  - "terminating"
  - "termination"
  - "terminal"
  - "terminus"
  - "determinator"
  - "exterminator"
  - "germinator"
  - "alternator"
  - "generator"
  - "dominator"
  - "nominate her"
  - "term in a tour"
  - "determine later"
  - "turn in a tater"

# Diversite locuteurs/prosodie (repris de prod)
noise_scales: [0.98]
noise_scale_ws: [0.98]
length_scales: [0.75, 1.0, 1.25]
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]

data_dir: ./data
output_dir: ./output_terminator

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 3
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

model:
  model_type: conv_attention
  model_size: small

# --- Training (reduit vs prod 100k pour tenir en ~1 h sur MPS) ---
steps: 30000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.5

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024   # ignore proprement si --skip-acav (trainer met le sampler a 0)
  background_noise: 50
